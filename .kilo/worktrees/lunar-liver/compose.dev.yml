services:
  db:
    image: postgres:16-alpine
    container_name: pharmx_db_dev
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mydb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d mydb"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
      target: dev

    container_name: pharmx_backend_dev

    working_dir: /app

    command: sh -c "npm install && rm -rf node_modules/.prisma && npx prisma generate && npm run dev -- --poll"

    env_file:
      - ./apps/backend/.env

    environment:
      PORT: ${PORT:-4000}
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      DATABASE_URL: postgresql://user:password@db:5432/mydb
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"

    ports:
      - "${PORT:-4000}:${PORT:-4000}"

    volumes:
      - ./apps/backend:/app
      - backend_node_modules:/app/node_modules

    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  backend_node_modules:
